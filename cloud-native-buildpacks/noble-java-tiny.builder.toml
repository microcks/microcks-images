description = "Ubuntu 24.04 Noble Numbat tiny image with only Java buildpacks included. To use, specify buildpacks at build time."

[[buildpacks]]
  uri = "docker://docker.io/paketobuildpacks/java-native-image:14.5.0"
  version = "14.5.0"

[[buildpacks]]
  uri = "docker://docker.io/paketobuildpacks/java:21.6.0"
  version = "21.6.0"

[lifecycle]
  version = "0.21.7"

[[order]]

  [[order.group]]
    id = "paketo-buildpacks/java-native-image"
    version = "14.5.0"

[[order]]

  [[order.group]]
    id = "paketo-buildpacks/java"
    version = "21.6.0"

[stack]
  build-image = "docker.io/microcks/build-noble-tiny:latest"
  id = "io.microcks.stacks.noble.tiny"
  run-image = "docker.io/microcks/run-noble-tiny:latest"
  run-image-mirrors = []

[[targets]]
  arch = "amd64"
  os = "linux"

[[targets]]
  arch = "arm64"
  os = "linux"